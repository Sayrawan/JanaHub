<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متتبع التمارين</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --surface: #111115;
    --surface2: #18181e;
    --border: #22222a;
    --text: #f0ede8;
    --muted: #666;
    --mon: #f97316;
    --wed: #22d3ee;
    --fri: #a78bfa;
    --green: #22c55e;
    --yellow: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0e0e12 0%, #14141a 100%); border-bottom: 1px solid var(--border); padding: 18px 20px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; max-width: 780px; margin-inline: auto; }
  .logo { width: 46px; height: 46px; border-radius: 13px; background: linear-gradient(135deg, #f97316, #fb923c); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 4px 20px rgba(249,115,22,.3); }
  .tabs { display: flex; gap: 6px; max-width: 780px; margin-inline: auto; padding-bottom: 0; overflow-x: auto; }
  .tab { padding: 9px 18px; border-radius: 10px 10px 0 0; border: 1px solid transparent; background: transparent; color: var(--muted); cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700; white-space: nowrap; transition: all .2s; border-bottom: none; }
  .tab.active { background: var(--bg); color: var(--text); border-color: var(--border); border-bottom-color: var(--bg); }

  /* LAYOUT */
  .container { max-width: 780px; margin: 0 auto; padding: 24px 16px; }
  .page { display: none; } .page.active { display: block; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
  .card-sm { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }

  /* DAY TABS */
  .day-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .day-tab { flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700; text-align: center; transition: all .2s; }
  .day-tab.active-mon { border-color: var(--mon); background: rgba(249,115,22,.12); color: var(--mon); }
  .day-tab.active-wed { border-color: var(--wed); background: rgba(34,211,238,.12); color: var(--wed); }
  .day-tab.active-fri { border-color: var(--fri); background: rgba(167,139,250,.12); color: var(--fri); }

  /* PROGRESS BAR */
  .bar-bg { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

  /* SET BUTTONS */
  .sets-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .set-btn { width: 40px; height: 40px; border-radius: 9px; border: 1.5px solid #333; background: var(--surface2); color: #888; font-size: 13px; font-weight: 800; cursor: pointer; font-family: 'Cairo', sans-serif; transition: all .2s; display: flex; align-items: center; justify-content: center; }
  .set-btn.done { background: linear-gradient(135deg, #22c55e, #16a34a); border-color: #22c55e; color: #fff; box-shadow: 0 0 12px rgba(34,197,94,.35); transform: scale(1.05); }
  .set-btn:hover:not(.done) { border-color: #555; color: #ccc; }

  /* EXERCISE CARD */
  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; transition: border-color .2s; }
  .ex-card:hover { border-color: #2e2e38; }
  .ex-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
  .ex-thumb { width: 62px; height: 52px; border-radius: 9px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .ex-thumb-placeholder { width: 62px; height: 52px; border-radius: 9px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name-en { font-size: 15px; font-weight: 800; color: var(--text); }
  .ex-name-ar { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .ex-meta { font-size: 11px; color: #555; margin-top: 3px; }
  .ex-body { padding: 0 16px 16px; border-top: 1px solid var(--border); display: none; }
  .ex-body.open { display: block; animation: fadeUp .2s ease; }
  .ex-video-wrap { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; background: #000; margin: 14px 0 12px; }
  .ex-video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .ex-video-link { display: flex; align-items: center; gap: 8px; background: rgba(255,0,0,.1); border: 1px solid rgba(255,0,0,.2); color: #f87171; padding: 8px 12px; border-radius: 9px; font-size: 13px; margin: 12px 0; cursor: pointer; text-decoration: none; }
  .weight-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .inp { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 9px; font-family: 'Cairo', sans-serif; font-size: 14px; outline: none; transition: border-color .2s; }
  .inp:focus { border-color: #555; }
  .btn { padding: 9px 18px; border-radius: 9px; border: none; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; transition: all .2s; }
  .btn-primary { background: var(--green); color: #000; }
  .btn-orange { background: var(--mon); color: #000; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; }
  .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; animation: fadeUp .2s ease; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 900; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; font-weight: 700; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--surface2); border-radius: 12px; padding: 14px; text-align: center; border: 1px solid var(--border); }
  .stat-val { font-size: 26px; font-weight: 900; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* BODY WEIGHT CHART */
  .bw-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--surface2); }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1a2a1a; border: 1px solid var(--green); color: #86efac; padding: 10px 22px; border-radius: 30px; font-size: 14px; font-weight: 700; z-index: 9999; transition: transform .3s ease; pointer-events: none; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* WEEK NAV */
  .week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .week-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 9px; cursor: pointer; font-size: 15px; transition: all .2s; }
  .week-nav button:hover { color: var(--text); border-color: #444; }
  .week-nav .week-label { flex: 1; text-align: center; font-size: 14px; font-weight: 700; color: var(--muted); }

  /* EDITABLE CHIPS */
  .chip { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--muted); }
  .add-ex-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px dashed #333; background: transparent; color: #555; font-family: 'Cairo', sans-serif; font-size: 14px; cursor: pointer; transition: all .2s; margin-top: 4px; }
  .add-ex-btn:hover { border-color: #555; color: var(--muted); }

  @media(max-width:500px) { .stats-grid { grid-template-columns: repeat(2,1fr); } .day-tab { font-size: 12px; padding: 8px 6px; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">💪</div>
    <div>
      <div style="font-size:20px;font-weight:900;letter-spacing:-0.5px">متتبع التمارين</div>
      <div style="font-size:12px;color:var(--muted)">20kg Barbell · 3 أيام أسبوعياً</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showPage('workout',this)">🏋️ التمرين</button>
    <button class="tab" onclick="showPage('progress',this)">📊 التقدم</button>
    <button class="tab" onclick="showPage('history',this)">📅 السجل</button>
    <button class="tab" onclick="showPage('body',this)">⚖️ الوزن</button>
    <button class="tab" onclick="showPage('manage',this)">⚙️ الإدارة</button>
  </div>
</div>

<div class="container">

<!-- ===== WORKOUT PAGE ===== -->
<div id="page-workout" class="page active">
  <div class="day-tabs">
    <button class="day-tab" id="tab-mon" onclick="setDay('monday')"></button>
    <button class="day-tab" id="tab-wed" onclick="setDay('wednesday')"></button>
    <button class="day-tab" id="tab-fri" onclick="setDay('friday')"></button>
  </div>
  <div id="session-header" class="card" style="margin-bottom:16px"></div>
  <div id="exercises-list"></div>
  <div class="card" style="margin-top:4px">
    <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px">📝 ملاحظات الجلسة</div>
    <textarea id="session-note" class="inp" style="width:100%;min-height:75px;resize:vertical" placeholder="كيف كانت الجلسة؟ أي ألم، تقدم في الوزن..."></textarea>
    <button class="btn btn-primary" style="margin-top:10px" onclick="saveNote()">حفظ الملاحظة</button>
  </div>
</div>

<!-- ===== PROGRESS PAGE ===== -->
<div id="page-progress" class="page">
  <div class="week-nav">
    <button onclick="changeWeek(-1)">&#8594;</button>
    <div class="week-label" id="week-label">هذا الأسبوع</div>
    <button onclick="changeWeek(1)" id="btn-next-week">&#8592;</button>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:14px;color:var(--muted)">إجمالي الأسبوع</div>
      <div id="week-pct" style="font-size:28px;font-weight:900"></div>
    </div>
    <div class="bar-bg"><div id="week-bar" class="bar-fill" style="background:linear-gradient(90deg,#22d3ee,#22c55e)"></div></div>
    <div id="days-overview" style="display:flex;gap:10px;margin-top:16px"></div>
  </div>
  <div id="weight-progress"></div>
</div>

<!-- ===== HISTORY PAGE ===== -->
<div id="page-history" class="page">
  <div style="font-size:18px;font-weight:900;margin-bottom:18px">سجل الجلسات</div>
  <div id="history-list"></div>
</div>

<!-- ===== BODY WEIGHT PAGE ===== -->
<div id="page-body" class="page">
  <div style="font-size:18px;font-weight:900;margin-bottom:18px">متابعة الوزن</div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px">تسجيل وزن جديد</div>
    <div style="display:flex;gap:10px">
      <input id="bw-input" class="inp" style="flex:1" type="number" placeholder="الوزن بالكيلوجرام" step="0.1">
      <button class="btn btn-orange" onclick="addBodyWeight()">+ أضف</button>
    </div>
  </div>
  <div id="bw-stats" style="display:none" class="card" style="margin-bottom:14px"></div>
  <div id="bw-list" class="card"></div>
</div>

<!-- ===== MANAGE PAGE ===== -->
<div id="page-manage" class="page">
  <div style="font-size:18px;font-weight:900;margin-bottom:6px">إدارة الجدول</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:20px">أضف، عدّل، أو احذف تمارين وأيام التدريب</div>
  <div id="manage-list"></div>
  <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="openAddDay()">+ إضافة يوم تدريب جديد</button>
  <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
    <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px">⚠️ منطقة الخطر</div>
    <button class="btn btn-danger btn-sm" onclick="clearAllData()">حذف جميع البيانات المحفوظة</button>
  </div>
</div>

</div><!-- /container -->

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL: Edit Exercise -->
<div class="modal-overlay" id="modal-ex">
  <div class="modal">
    <h3 id="modal-ex-title">تعديل التمرين</h3>
    <input type="hidden" id="edit-day-key">
    <input type="hidden" id="edit-ex-idx">
    <div class="form-group">
      <label class="form-label">اسم التمرين (English)</label>
      <input id="edit-ex-name-en" class="inp" style="width:100%" placeholder="e.g. Barbell Bench Press">
    </div>
    <div class="form-group">
      <label class="form-label">الاسم بالعربي</label>
      <input id="edit-ex-name-ar" class="inp" style="width:100%" placeholder="بنش برس بالباربيل">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" class="form-group">
      <div>
        <label class="form-label">عدد السيتات</label>
        <input id="edit-ex-sets" class="inp" style="width:100%" type="number" min="1" max="10">
      </div>
      <div>
        <label class="form-label">التكرارات</label>
        <input id="edit-ex-reps" class="inp" style="width:100%" placeholder="8-10">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">وقت الراحة</label>
      <input id="edit-ex-rest" class="inp" style="width:100%" placeholder="90 ث">
    </div>
    <div class="form-group">
      <label class="form-label">رابط YouTube للشرح (اختياري)</label>
      <input id="edit-ex-video" class="inp" style="width:100%" placeholder="https://www.youtube.com/watch?v=...">
      <div style="font-size:11px;color:var(--muted);margin-top:4px">سيظهر كـ embed داخل التطبيق</div>
    </div>
    <div class="form-group">
      <label class="form-label">رابط صورة GIF (اختياري)</label>
      <input id="edit-ex-gif" class="inp" style="width:100%" placeholder="https://...gif">
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-primary" style="flex:1" onclick="saveExercise()">حفظ</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-ex')">إلغاء</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Day -->
<div class="modal-overlay" id="modal-day">
  <div class="modal">
    <h3>إضافة يوم تدريب</h3>
    <div class="form-group">
      <label class="form-label">اسم اليوم (بالعربي)</label>
      <input id="new-day-label" class="inp" style="width:100%" placeholder="الثلاثاء">
    </div>
    <div class="form-group">
      <label class="form-label">المعرّف (بالإنجليزي بدون مسافات)</label>
      <input id="new-day-key" class="inp" style="width:100%" placeholder="tuesday">
    </div>
    <div class="form-group">
      <label class="form-label">التركيز / عضلات اليوم</label>
      <input id="new-day-focus" class="inp" style="width:100%" placeholder="بايسبس + ترايسبس">
    </div>
    <div class="form-group">
      <label class="form-label">لون اليوم</label>
      <input id="new-day-color" type="color" value="#22c55e" style="height:38px;border:none;background:none;cursor:pointer">
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-primary" style="flex:1" onclick="saveNewDay()">إضافة</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-day')">إلغاء</button>
    </div>
  </div>
</div>

<!-- MODAL: Edit Day -->
<div class="modal-overlay" id="modal-edit-day">
  <div class="modal">
    <h3>تعديل اليوم</h3>
    <input type="hidden" id="edit-day-orig-key">
    <div class="form-group">
      <label class="form-label">اسم اليوم</label>
      <input id="edit-day-label" class="inp" style="width:100%">
    </div>
    <div class="form-group">
      <label class="form-label">التركيز</label>
      <input id="edit-day-focus" class="inp" style="width:100%">
    </div>
    <div class="form-group">
      <label class="form-label">اللون</label>
      <input id="edit-day-color" type="color" style="height:38px;border:none;background:none;cursor:pointer">
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-primary" style="flex:1" onclick="saveEditDay()">حفظ</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-edit-day')">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
const DEFAULT_SCHEDULE = {
  monday: {
    label: "الاثنين", focus: "Chest / Shoulder / Triceps", color: "#f97316",
    exercises: [
      { id:"e1", nameEn:"Barbell Floor Press", nameAr:"بنش برس أرضي", sets:4, reps:"8–10", rest:"90 ث", video:"https://www.youtube.com/embed/vthMCtgVtFw", gif:"" },
      { id:"e2", nameEn:"Overhead Barbell Press", nameAr:"أوفر هيد برس", sets:3, reps:"10–12", rest:"90 ث", video:"https://www.youtube.com/embed/2yjwXTZQDDI", gif:"" },
      { id:"e3", nameEn:"Wide Push-Up", nameAr:"بوش أب واسع", sets:3, reps:"Max", rest:"60 ث", video:"https://www.youtube.com/embed/IODxDxX7oi4", gif:"" },
      { id:"e4", nameEn:"Lateral Raise", nameAr:"لاترال ريز", sets:3, reps:"12–15", rest:"60 ث", video:"https://www.youtube.com/embed/3VcKaXpzqRo", gif:"" },
      { id:"e5", nameEn:"Overhead Triceps Extension", nameAr:"ترايسبس أوفر هيد", sets:3, reps:"12", rest:"60 ث", video:"https://www.youtube.com/embed/YbX7Wd8jQ-Q", gif:"" },
    ]
  },
  wednesday: {
    label: "الأربعاء", focus: "Back / Biceps", color: "#22d3ee",
    exercises: [
      { id:"e6", nameEn:"Barbell Deadlift", nameAr:"ديدليفت", sets:4, reps:"6–8", rest:"2 د", video:"https://www.youtube.com/embed/op9kVnSso6Q", gif:"" },
      { id:"e7", nameEn:"Bent Over Row", nameAr:"بنت أوفر رو", sets:4, reps:"8–10", rest:"90 ث", video:"https://www.youtube.com/embed/vT2GjY_Umpw", gif:"" },
      { id:"e8", nameEn:"Barbell Curl", nameAr:"باربيل كيرل", sets:3, reps:"10–12", rest:"60 ث", video:"https://www.youtube.com/embed/kwG2ipFRgfo", gif:"" },
      { id:"e9", nameEn:"Hammer Curl", nameAr:"هامر كيرل", sets:3, reps:"12", rest:"60 ث", video:"https://www.youtube.com/embed/zC3nLlEvin4", gif:"" },
      { id:"e10", nameEn:"Superman Hold", nameAr:"سوبرمان (ظهر سفلي)", sets:3, reps:"15", rest:"45 ث", video:"https://www.youtube.com/embed/z6PJMT2y8GQ", gif:"" },
    ]
  },
  friday: {
    label: "الجمعة", focus: "Legs / Core / Cardio", color: "#a78bfa",
    exercises: [
      { id:"e11", nameEn:"Barbell Squat", nameAr:"سكوات بالباربيل", sets:4, reps:"8–10", rest:"90 ث", video:"https://www.youtube.com/embed/ultWZbUMPL8", gif:"" },
      { id:"e12", nameEn:"Romanian Deadlift", nameAr:"رومانيان ديدليفت", sets:3, reps:"10–12", rest:"90 ث", video:"https://www.youtube.com/embed/JCXUYuzwNrM", gif:"" },
      { id:"e13", nameEn:"Barbell Lunges", nameAr:"لانجز بالأوزان", sets:3, reps:"12 each", rest:"60 ث", video:"https://www.youtube.com/embed/D7KaRcUTQeE", gif:"" },
      { id:"e14", nameEn:"Calf Raise", nameAr:"كالف ريز", sets:3, reps:"15–20", rest:"45 ث", video:"https://www.youtube.com/embed/gwLzBJYoWlI", gif:"" },
      { id:"e15", nameEn:"Plank", nameAr:"بلانك", sets:3, reps:"45 sec", rest:"30 ث", video:"https://www.youtube.com/embed/ASdvN_XEl_c", gif:"" },

      { id:"e17", nameEn:"HIIT Cardio (High Knees / Jumping Jacks)", nameAr:"كارديو متقطع", sets:1, reps:"10 min", rest:"—", video:"https://www.youtube.com/embed/oDdkytliOqE", gif:"" },
    ]
  }
};

function loadData() {
  try { const r = localStorage.getItem("ftData2"); return r ? JSON.parse(r) : { schedule: DEFAULT_SCHEDULE, logs: {}, weights: {}, notes: {}, bodyWeight: [], dayOrder: ["monday","wednesday","friday"] }; }
  catch { return { schedule: DEFAULT_SCHEDULE, logs: {}, weights: {}, notes: {}, bodyWeight: [], dayOrder: ["monday","wednesday","friday"] }; }
}
function save() { localStorage.setItem("ftData2", JSON.stringify(D)); }

let D = loadData();
if (!D.dayOrder) D.dayOrder = Object.keys(D.schedule);
let activeDay = D.dayOrder[0] || "monday";
let weekOffset = 0;
let openExId = null;

// ===================== UTILS =====================
function getWeekKey(off=0) {
  const n = new Date(); n.setDate(n.getDate() + off*7);
  const m = new Date(n); m.setDate(n.getDate() - ((n.getDay()+6)%7));
  return m.toISOString().slice(0,10);
}
function sessionKey(dk, off=0) { return `${getWeekKey(off)}_${dk}`; }
function toast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function openModal(id) { document.getElementById(id).classList.add("open"); }
function getYTId(url) {
  if (!url) return null;
  const m = url.match(/(?:embed\/|v=|youtu\.be\/)([^&?/]+)/);
  return m ? m[1] : null;
}
function embedUrl(url) {
  if (!url) return null;
  if (url.includes("embed/")) return url;
  const id = getYTId(url);
  return id ? `https://www.youtube.com/embed/${id}` : null;
}
function getSessionProgress(dk, off=0) {
  const sk = sessionKey(dk, off), day = D.schedule[dk];
  if (!day) return { done:0, total:0, pct:0 };
  const log = D.logs[sk]||{};
  let done=0, total=0;
  day.exercises.forEach(ex => { for(let i=0;i<ex.sets;i++){total++;if(log[ex.id]?.[i])done++;} });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

// ===================== PAGE NAV =====================
function showPage(name, btn) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  btn.classList.add("active");
  if (name==="progress") renderProgress();
  if (name==="history") renderHistory();
  if (name==="body") renderBody();
  if (name==="manage") renderManage();
}

// ===================== WORKOUT =====================
function setDay(dk) {
  activeDay = dk;
  openExId = null;
  renderDayTabs();
  renderSessionHeader();
  renderExercises();
  const sk = sessionKey(dk);
  document.getElementById("session-note").value = D.notes[sk]||"";
}

function renderDayTabs() {
  D.dayOrder.forEach(dk => {
    const d = D.schedule[dk]; if(!d) return;
    const btn = document.getElementById("tab-"+dk);
    if (!btn) return;
    const p = getSessionProgress(dk);
    btn.textContent = d.label + (p.done>0 ? ` ${p.pct}%` : "");
    btn.className = "day-tab";
    if (dk===activeDay) {
      const cls = dk==="monday"?"active-mon":dk==="wednesday"?"active-wed":"active-fri";
      btn.classList.add(dk===activeDay?(dk==="monday"?"active-mon":dk==="wednesday"?"active-wed":"active-fri"):"");
      // generic color for custom days
      if (!["monday","wednesday","friday"].includes(dk)) {
        btn.style.borderColor = d.color; btn.style.background = d.color+"22"; btn.style.color = d.color;
      }
    }
  });
}

function rebuildDayTabs() {
  const row = document.querySelector(".day-tabs"); row.innerHTML = "";
  D.dayOrder.forEach(dk => {
    const d = D.schedule[dk]; if(!d) return;
    const btn = document.createElement("button");
    btn.className = "day-tab"; btn.id = "tab-"+dk;
    btn.onclick = () => setDay(dk);
    row.appendChild(btn);
  });
  renderDayTabs();
}

function renderSessionHeader() {
  const d = D.schedule[activeDay]; if(!d) return;
  const prog = getSessionProgress(activeDay);
  document.getElementById("session-header").style.borderColor = d.color+"44";
  document.getElementById("session-header").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:18px;font-weight:900;color:${d.color}">${d.label}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">${d.focus}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:28px;font-weight:900">${prog.pct}%</div>
        <div style="font-size:11px;color:var(--muted)">${prog.done}/${prog.total} سيت</div>
      </div>
    </div>
    <div class="bar-bg" style="margin-top:12px"><div class="bar-fill" style="width:${prog.pct}%;background:linear-gradient(90deg,${d.color},${d.color}99)"></div></div>`;
}

function renderExercises() {
  const d = D.schedule[activeDay]; if(!d) return;
  const sk = sessionKey(activeDay);
  const log = D.logs[sk]||{}, wts = D.weights[sk]||{};
  const list = document.getElementById("exercises-list"); list.innerHTML = "";

  d.exercises.forEach((ex, idx) => {
    const isOpen = openExId === ex.id;
    const embed = embedUrl(ex.video);
    const setsHTML = Array.from({length:ex.sets}).map((_,i) =>
      `<button class="set-btn${log[ex.id]?.[i]?' done':''}" onclick="toggleSet('${ex.id}',${i})">${log[ex.id]?.[i]?'✓':i+1}</button>`
    ).join("");

    const thumbHTML = ex.gif
      ? `<img class="ex-thumb" src="${ex.gif}" alt="${ex.nameEn}" loading="lazy">`
      : `<div class="ex-thumb-placeholder">${getExEmoji(ex.nameEn)}</div>`;

    const videoSection = embed ? `
      <div class="ex-video-wrap">
        <iframe src="${embed}${isOpen?'?autoplay=0':''}" title="${ex.nameEn}" allowfullscreen loading="lazy"></iframe>
      </div>` : `
      <a class="ex-video-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(ex.nameEn+' exercise tutorial')}" target="_blank">
        🎬 ابحث عن شرح ${ex.nameEn} على YouTube
      </a>`;

    const card = document.createElement("div");
    card.className = "ex-card"; card.id = "excard-"+ex.id;
    card.innerHTML = `
      <div class="ex-header" onclick="toggleExCard('${ex.id}')">
        ${thumbHTML}
        <div class="ex-info">
          <div class="ex-name-en">${ex.nameEn}</div>
          <div class="ex-name-ar">${ex.nameAr}</div>
          <div class="ex-meta">${ex.sets} sets × ${ex.reps} &nbsp;|&nbsp; Rest: ${ex.rest}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${wts[ex.id]?`<span style="font-size:13px;font-weight:800;color:${D.schedule[activeDay].color}">${wts[ex.id]}kg</span>`:''}
          <span style="font-size:18px;color:var(--muted);transition:transform .2s;display:block;transform:${isOpen?'rotate(90deg)':'rotate(0)'}" id="chevron-${ex.id}">›</span>
        </div>
      </div>
      <div class="ex-body${isOpen?' open':''}" id="body-${ex.id}">
        ${videoSection}
        <div class="weight-row">
          <input class="inp" style="width:110px" type="number" placeholder="الوزن (kg)" step="0.5" value="${wts[ex.id]||''}" id="w-${ex.id}" onchange="saveWeight('${ex.id}')">
          <span style="font-size:13px;color:var(--muted)">الوزن المستخدم</span>
        </div>
        <div class="sets-row">${setsHTML}</div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="openEditExercise('${activeDay}',${idx})">✏️ تعديل</button>
          <button class="btn btn-danger btn-sm" onclick="deleteExercise('${activeDay}',${idx})">🗑 حذف</button>
        </div>
      </div>`;
    list.appendChild(card);
  });

  // Add exercise button
  const addBtn = document.createElement("button");
  addBtn.className = "add-ex-btn";
  addBtn.textContent = "+ إضافة تمرين جديد";
  addBtn.onclick = () => openAddExercise(activeDay);
  list.appendChild(addBtn);
}

function getExEmoji(name) {
  const n = name.toLowerCase();
  if (n.includes("squat")||n.includes("leg")||n.includes("lunge")||n.includes("calf")) return "🦵";
  if (n.includes("deadlift")) return "🏋️";
  if (n.includes("curl")||n.includes("bicep")) return "💪";
  if (n.includes("press")||n.includes("push")) return "🤸";
  if (n.includes("row")||n.includes("back")||n.includes("superman")||n.includes("pull")) return "🔙";
  if (n.includes("plank")||n.includes("crunch")||n.includes("core")) return "🧘";
  if (n.includes("cardio")||n.includes("jump")||n.includes("hiit")) return "🏃";
  return "⚡";
}

function toggleExCard(exId) {
  openExId = openExId === exId ? null : exId;
  renderExercises();
}

function toggleSet(exId, idx) {
  const sk = sessionKey(activeDay);
  if (!D.logs[sk]) D.logs[sk] = {};
  if (!D.logs[sk][exId]) D.logs[sk][exId] = [];
  D.logs[sk][exId][idx] = !D.logs[sk][exId][idx];
  save();
  renderSessionHeader();
  renderDayTabs();
  // Re-render just the sets row
  const setsRow = document.querySelector(`#body-${exId} .sets-row`);
  if (setsRow) {
    const ex = D.schedule[activeDay].exercises.find(e=>e.id===exId);
    const log = D.logs[sk]||{};
    setsRow.innerHTML = Array.from({length:ex.sets}).map((_,i)=>
      `<button class="set-btn${log[exId]?.[i]?' done':''}" onclick="toggleSet('${exId}',${i})">${log[exId]?.[i]?'✓':i+1}</button>`
    ).join("");
  }
}

function saveWeight(exId) {
  const sk = sessionKey(activeDay);
  if (!D.weights[sk]) D.weights[sk] = {};
  const val = document.getElementById("w-"+exId)?.value;
  if (val) { D.weights[sk][exId] = parseFloat(val); save(); toast("✅ تم حفظ الوزن"); }
}

function saveNote() {
  const sk = sessionKey(activeDay);
  D.notes[sk] = document.getElementById("session-note").value;
  save(); toast("✅ تم حفظ الملاحظة");
}

// ===================== EDIT EXERCISE =====================
function openEditExercise(dk, idx) {
  const ex = D.schedule[dk].exercises[idx];
  document.getElementById("modal-ex-title").textContent = "تعديل: " + ex.nameEn;
  document.getElementById("edit-day-key").value = dk;
  document.getElementById("edit-ex-idx").value = idx;
  document.getElementById("edit-ex-name-en").value = ex.nameEn;
  document.getElementById("edit-ex-name-ar").value = ex.nameAr;
  document.getElementById("edit-ex-sets").value = ex.sets;
  document.getElementById("edit-ex-reps").value = ex.reps;
  document.getElementById("edit-ex-rest").value = ex.rest;
  document.getElementById("edit-ex-video").value = ex.video||"";
  document.getElementById("edit-ex-gif").value = ex.gif||"";
  openModal("modal-ex");
}

function openAddExercise(dk) {
  document.getElementById("modal-ex-title").textContent = "إضافة تمرين";
  document.getElementById("edit-day-key").value = dk;
  document.getElementById("edit-ex-idx").value = -1;
  ["name-en","name-ar","sets","reps","rest","video","gif"].forEach(f => document.getElementById("edit-ex-"+f).value="");
  document.getElementById("edit-ex-sets").value = 3;
  openModal("modal-ex");
}

function saveExercise() {
  const dk = document.getElementById("edit-day-key").value;
  const idx = parseInt(document.getElementById("edit-ex-idx").value);
  const ex = {
    id: idx===-1 ? "e"+Date.now() : D.schedule[dk].exercises[idx].id,
    nameEn: document.getElementById("edit-ex-name-en").value.trim()||"Exercise",
    nameAr: document.getElementById("edit-ex-name-ar").value.trim()||"",
    sets: parseInt(document.getElementById("edit-ex-sets").value)||3,
    reps: document.getElementById("edit-ex-reps").value.trim()||"10",
    rest: document.getElementById("edit-ex-rest").value.trim()||"60 ث",
    video: document.getElementById("edit-ex-video").value.trim(),
    gif: document.getElementById("edit-ex-gif").value.trim(),
  };
  if (idx===-1) D.schedule[dk].exercises.push(ex);
  else D.schedule[dk].exercises[idx] = ex;
  save(); closeModal("modal-ex"); openExId=null;
  renderExercises(); renderSessionHeader();
  toast(idx===-1?"✅ تمت الإضافة":"✅ تم الحفظ");
}

function deleteExercise(dk, idx) {
  if (!confirm("حذف هذا التمرين؟")) return;
  D.schedule[dk].exercises.splice(idx,1);
  save(); openExId=null; renderExercises(); renderSessionHeader();
  toast("🗑 تم الحذف");
}

// ===================== PROGRESS =====================
function renderProgress() {
  const sessions = D.dayOrder.map(dk => ({ dk, ...getSessionProgress(dk, weekOffset) }));
  const total = sessions.reduce((s,d)=>s+d.total,0);
  const done = sessions.reduce((s,d)=>s+d.done,0);
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("week-pct").textContent = pct+"%";
  document.getElementById("week-bar").style.width = pct+"%";
  document.getElementById("week-label").textContent = weekOffset===0?"هذا الأسبوع":`أسبوع ${getWeekKey(weekOffset)}`;
  document.getElementById("btn-next-week").disabled = weekOffset===0;
  document.getElementById("btn-next-week").style.opacity = weekOffset===0?".3":"1";

  const ov = document.getElementById("days-overview"); ov.innerHTML="";
  sessions.forEach(({dk,done,total,pct}) => {
    const d = D.schedule[dk]; if(!d) return;
    ov.innerHTML += `<div style="flex:1;background:#0D0D0F;border-radius:12px;padding:12px 10px;text-align:center;border:1px solid ${d.color}33">
      <div style="font-size:13px;font-weight:800;color:${d.color}">${d.label}</div>
      <div style="font-size:22px;font-weight:900;margin-top:6px">${pct}%</div>
      <div style="font-size:11px;color:#555;margin-top:2px">${done}/${total}</div>
      <div class="bar-bg" style="margin-top:8px;height:4px"><div class="bar-fill" style="width:${pct}%;background:${d.color}"></div></div>
    </div>`;
  });

  const wp = document.getElementById("weight-progress"); wp.innerHTML="";
  D.dayOrder.forEach(dk => {
    const d = D.schedule[dk]; if(!d) return;
    const sk = sessionKey(dk, weekOffset), w = D.weights[sk]||{};
    const hasW = Object.keys(w).length>0;
    wp.innerHTML += `<div class="card" style="margin-bottom:12px">
      <div style="font-size:15px;font-weight:800;color:${d.color};margin-bottom:12px">${d.label} — ${d.focus}</div>
      ${hasW ? d.exercises.filter(ex=>w[ex.id]).map(ex=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--surface2)">
          <div style="font-size:14px">${ex.nameEn}</div>
          <div style="font-size:15px;font-weight:800;color:${d.color}">${w[ex.id]}kg</div>
        </div>`).join("") : '<div style="font-size:13px;color:var(--muted)">لا يوجد تسجيل أوزان لهذا الأسبوع</div>'}
    </div>`;
  });
}
function changeWeek(dir) { weekOffset = Math.min(0, weekOffset + dir); renderProgress(); }

// ===================== HISTORY =====================
function renderHistory() {
  const list = document.getElementById("history-list");
  const keys = Object.keys(D.logs).sort((a,b)=>b.localeCompare(a));
  if (!keys.length) { list.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px"><div style="font-size:40px">📋</div><div style="margin-top:12px">لا توجد جلسات مسجلة بعد</div></div>'; return; }
  list.innerHTML = keys.map(sk => {
    const [wk, dk] = sk.split("_");
    const d = D.schedule[dk]; if(!d) return "";
    const log = D.logs[sk];
    let done=0,total=0;
    d.exercises.forEach(ex=>{for(let i=0;i<ex.sets;i++){total++;if(log[ex.id]?.[i])done++;}});
    const pct = total?Math.round(done/total*100):0;
    const note = D.notes[sk]||"";
    const w = D.weights[sk]||{};
    const wChips = d.exercises.filter(ex=>w[ex.id]).map(ex=>`<span class="chip" style="color:${d.color};border-color:${d.color}44">${ex.nameEn.split(" ")[0]}: ${w[ex.id]}kg</span>`).join("");
    return `<div class="card" style="border-color:${d.color}22;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:15px;font-weight:800;color:${d.color}">${d.label} — ${d.focus}</div><div style="font-size:12px;color:#555;margin-top:2px">أسبوع ${wk}</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:900">${pct}%</div><div style="font-size:11px;color:#555">${done}/${total}</div></div>
      </div>
      ${wChips?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">${wChips}</div>`:''}
      ${note?`<div style="margin-top:10px;background:#0D0D0F;border-radius:8px;padding:8px 12px;font-size:13px;color:#aaa;border-right:3px solid ${d.color}">${note}</div>`:''}
    </div>`;
  }).join("");
}

// ===================== BODY WEIGHT =====================
function addBodyWeight() {
  const v = document.getElementById("bw-input").value;

  D.bodyWeight.push({ date: new Date().toISOString().slice(0,10), weight: parseFloat(v) });

}
function renderBody() {
  const bw = D.bodyWeight||[];
  const stats = document.getElementById("bw-stats");
  if (bw.length>=2) {
    const diff = (bw[bw.length-1].weight - bw[0].weight).toFixed(1);
    stats.style.display="block";
    stats.innerHTML = `<div style="display:flex;gap:10px">
      ${[["البداية",bw[0].weight],["الحالي",bw[bw.length-1].weight],["التغيير",(diff>0?"+":"")+diff]].map(([l,v],i)=>`
      <div style="flex:1;text-align:center;background:var(--surface2);border-radius:10px;padding:12px">
        <div style="font-size:11px;color:var(--muted)">${l}</div>
        <div style="font-size:22px;font-weight:900;margin-top:4px;color:${i===2?(diff>0?"#f87171":diff<0?"#22c55e":"#aaa"):"var(--text)"}">${v}</div>
        ${i<2?'<div style="font-size:11px;color:var(--muted)">كجم</div>':''}

  bl.innerHTML = `<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px">السجل</div>`

      </div>

}
function deleteBW(idx) { D.bodyWeight.splice(idx,1); save(); renderBody(); }

function openAddDay() { document.getElementById("new-day-label").value=""; document.getElementById("new-day-key").value=""; document.getElementById("new-day-focus").value=""; openModal("modal-day"); }
function saveNewDay() {
  const label=document.getElementById("new-day-label").value.trim(), key=document.getElementById("new-day-key").value.trim().replace(/\s/g,"_").toLowerCase(), focus=document.getElementById("new-day-focus").value.trim(), color=document.getElementById("new-day-color").value;
  if (!label||!key) { toast("⚠️ أدخل الاسم والمعرّف"); return; }
  if (D.schedule[key]) { toast("⚠️ هذا المعرّف موجود بالفعل"); return; }
  D.schedule[key]={label,focus,color,exercises:[]};
  D.dayOrder.push(key);
  save(); closeModal("modal-day"); rebuildDayTabs(); renderManage(); toast("✅ تمت إضافة اليوم");
}
function openEditDay(dk) {
  const d=D.schedule[dk];
  document.getElementById("edit-day-orig-key").value=dk;
  document.getElementById("edit-day-label").value=d.label;
  document.getElementById("edit-day-focus").value=d.focus;
  document.getElementById("edit-day-color").value=d.color;
  openModal("modal-edit-day");
}
function saveEditDay() {
  const dk=document.getElementById("edit-day-orig-key").value;
  D.schedule[dk].label=document.getElementById("edit-day-label").value.trim();
  D.schedule[dk].focus=document.getElementById("edit-day-focus").value.trim();
  D.schedule[dk].color=document.getElementById("edit-day-color").value;
  save(); closeModal("modal-edit-day"); rebuildDayTabs(); renderManage();
  if(activeDay===dk){renderSessionHeader();renderExercises();}
  toast("✅ تم الحفظ");
}
function deleteDay(dk) {
  if (!confirm(`حذف يوم "${D.schedule[dk].label}" وجميع تمارينه؟`)) return;
  delete D.schedule[dk];
  D.dayOrder = D.dayOrder.filter(k=>k!==dk);
  if (activeDay===dk) activeDay = D.dayOrder[0]||"";
  save(); rebuildDayTabs(); renderManage(); renderExercises(); toast("🗑 تم حذف اليوم");
}
function clearAllData() {
  if (!confirm("هل أنت متأكد؟ سيتم حذف جميع البيانات المحفوظة ولا يمكن التراجع.")) return;
  localStorage.removeItem("ftData2"); location.reload();
}

// Close modals on overlay click
document.querySelectorAll(".modal-overlay").forEach(el => el.addEventListener("click", e => { if(e.target===el) el.classList.remove("open"); }));

// ===================== INIT =====================
rebuildDayTabs();
setDay(activeDay);
</script>
</body>
</html>
